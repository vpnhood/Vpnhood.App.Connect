name: Publish Connect (All Platforms)

# Builds VpnHood CONNECT from the monorepo code (vpnhood/VpnHood-deploytest) and releases it to THIS
# repo (vpnhood/Vpnhood.App.Connect). The code is NOT forked here — it is checked out at build time
# into code/; this repo only holds the release plumbing (this workflow + fastlane/ config + metadata)
# and the Connect-specific secrets/variables. The monorepo remains the single source of code + version.
#
# Layout while running (THIS repo at root, monorepo tucked into code/):
#   $GITHUB_WORKSPACE/          -> THIS repo (fastlane/ — the ONLY fastlane on the natural path)
#   $GITHUB_WORKSPACE/code/     -> the MONOREPO (Src/, Pub/, _publish.ps1, CHANGELOG, its own code/fastlane/)
#   $GITHUB_WORKSPACE/.user/VpnHoodConnect/  -> materialized Connect config/secrets (= code/../.user, which
#                                               is what the csproj reads: $(SolutionDir)/../.user/VpnHoodConnect)
# Because fastlane runs from the workspace ROOT, it can ONLY find THIS repo's fastlane — the monorepo's
# code/fastlane (which targets the CLIENT package) is out of the way, so no working-directory juggling
# and no risk of publishing under the wrong package.
#
# Release procedure (see Pub/Connect/PublishByGithub.ps1 in the monorepo):
#   1. bump the MONOREPO (bump.yml, publish OFF) so PubVersion.json + CHANGELOG advance and push to main.
#   2. dispatch THIS workflow (ref = the bumped monorepo branch). No bump and no NuGet happen here.
#
# Secrets/variables live in THIS repo (Connect):
#   vars.APPSETTINGS, vars.PUBLISH                                  (Connect app config)
#   secrets.ACCESS_KEY_DEFAULT_GOOGLE / _WEB                        (embedded default server key)
#   secrets.ANDROID_KEYSTORE_GOOGLE_BASE64 / _PASSWORD             (Play signing)
#   secrets.ANDROID_KEYSTORE_WEB_BASE64 / _PASSWORD                (web APK signing)
# Shared org secrets are inherited: GOOGLE_PLAY_API_KEY, ADVANCED_INSTALLER_LICENSE,
#   AZURE_SIGNING_CREDENTIAL, AZURE_SIGNING_TARGET.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Monorepo branch or commit to build (blank = development)"
        required: false
        default: ""
      publish_release:
        description: "Create the GitHub release (on this Connect repo)"
        type: boolean
        required: false
        default: false
      build_android:
        description: "Build the Android apps (Google AAB + Web APKs). Off by default."
        type: boolean
        required: false
        default: false
      publish_play:
        description: "Publish the built AAB to Google Play (only applies when build_android is on)"
        type: boolean
        required: false
        default: true
      only_aab:
        description: "Only build the Android AAB (+ Play publish); skip Linux/Windows. Fast Play iteration."
        type: boolean
        required: false
        default: false
      rollout:
        description: "Google Play audience ratio (%) for a PRODUCTION release (1-100; 100 = full). Ignored on prerelease/alpha."
        required: false
        default: "100"

# The Connect update-info URLs (baked into the published JSONs) and the release target both resolve to
# THIS repo via VH_CONNECT_PUBLISH_REPO. github.repository == vpnhood/Vpnhood.App.Connect here.
env:
  VH_CONNECT_PUBLISH_REPO: ${{ github.repository }}
  # The monorepo that holds the Connect source (public -> no checkout token needed).
  CODE_REPO: vpnhood/VpnHood-deploytest

jobs:
  build-linux:
    # TEMP/opt: skipped when only_aab is set so the Android/Play path can be iterated quickly.
    if: ${{ github.event.inputs.only_aab != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo code
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ github.event.inputs.ref || 'development' }}", path: code }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: code/global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/code/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=code/Pub/bin/$tag/VpnHoodConnect" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Write Connect appsettings
        shell: pwsh
        env:
          APPSETTINGS: ${{ vars.APPSETTINGS }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:APPSETTINGS)) {
            Write-Host "::warning::APPSETTINGS not set; building with default appsettings."
          } else {
            $u = Join-Path $env:GITHUB_WORKSPACE ".user/VpnHoodConnect"
            New-Item -ItemType Directory -Path $u -Force | Out-Null
            $env:APPSETTINGS | Out-File (Join-Path $u "appsettings.json") -Encoding utf8 -Force
          }
      - name: Build Linux Connect
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/code/Src/Apps/Connect.Linux.Web/_publish.ps1"
        env: { DOTNET_NOLOGO: "1", DOTNET_CLI_TELEMETRY_OPTOUT: "1" }
      - uses: actions/upload-artifact@v7
        with:
          name: connect-linux
          if-no-files-found: error
          retention-days: 1
          path: |
            ${{ env.MODULE_DIR }}/linux-x64/**
            ${{ env.MODULE_DIR }}/linux-arm64/**
            ${{ env.MODULE_DIR }}/linux-any/**

  build-windows:
    # TEMP/opt: skipped when only_aab is set so the Android/Play path can be iterated quickly.
    if: ${{ github.event.inputs.only_aab != 'true' }}
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      # Missing license -> the Connect Windows build is skipped (a warning is emitted) so the job still
      # succeeds (green); it just doesn't produce/upload the exe + MSI.
      ADVANCED_INSTALLER_LICENSE: ${{ secrets.ADVANCED_INSTALLER_LICENSE }}
      # Optional code signing — present -> the exe + MSI are signed; absent -> PublishWinApp.ps1 warns
      # (console + GitHub annotation) and ships UNSIGNED.
      AZURE_SIGNING_CREDENTIAL: ${{ secrets.AZURE_SIGNING_CREDENTIAL }}
      AZURE_SIGNING_TARGET: ${{ vars.AZURE_SIGNING_TARGET || secrets.AZURE_SIGNING_TARGET }}
    steps:
      - name: Checkout monorepo code
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ github.event.inputs.ref || 'development' }}", path: code }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: code/global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/code/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=code/Pub/bin/$tag/VpnHoodConnect/windows-web" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Warn if Advanced Installer license is missing
        if: env.ADVANCED_INSTALLER_LICENSE == ''
        shell: pwsh
        run: |
          Write-Host "::warning title=Advanced Installer license missing::ADVANCED_INSTALLER_LICENSE is not set; skipping the Connect Windows build (exe + MSI). The release will omit the Windows installer."
      - name: Set up Advanced Installer
        if: env.ADVANCED_INSTALLER_LICENSE != ''
        uses: caphyon/advinst-github-action@7edde34c6ff935e53e3de72a5699efcfceb5f6c6 # v2.0.3
        with: { advinst-license: "${{ env.ADVANCED_INSTALLER_LICENSE }}" }
      - name: Write Connect appsettings
        if: env.ADVANCED_INSTALLER_LICENSE != ''
        shell: pwsh
        env:
          APPSETTINGS: ${{ vars.APPSETTINGS }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:APPSETTINGS)) {
            Write-Host "::warning::APPSETTINGS not set; building with default appsettings."
          } else {
            $u = Join-Path $env:GITHUB_WORKSPACE ".user/VpnHoodConnect"
            New-Item -ItemType Directory -Path $u -Force | Out-Null
            $env:APPSETTINGS | Out-File (Join-Path $u "appsettings.json") -Encoding utf8 -Force
          }
      # Single-call publish (no publish/package split): builds the self-contained exe and wraps it in
      # the MSI with Advanced Installer. Code-signing + the unsigned/Azure-not-configured warning are
      # handled inside PublishWinApp.ps1.
      - name: Build Windows Connect (exe + MSI)
        if: env.ADVANCED_INSTALLER_LICENSE != ''
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/code/Src/Apps/Connect.Win.Web/_publish.ps1"
      - uses: actions/upload-artifact@v7
        if: env.ADVANCED_INSTALLER_LICENSE != ''
        with:
          name: connect-windows
          if-no-files-found: warn
          retention-days: 1
          path: ${{ env.MODULE_DIR }}/**

  build-android:
    # Android is OFF by default; dispatch with build_android=true to build + bundle Android.
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: google-aab
            label: Google AAB
            script: Src/Apps/Connect.Android.Google/_publish.ps1
            outdir: android-google
          - id: web-apk
            label: Web APK
            script: Src/Apps/Connect.Android.Web/_publish.ps1
            outdir: android-web
          - id: web-arm64
            label: Web arm64 APK
            script: Src/Apps/Connect.Android.Web/_publish-arm64.ps1
            outdir: android-web-arm64
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      # Android signing keys. The secret names are app-agnostic (this is a single-app repo), but the
      # ENV names must stay ANDROID_KEYSTORE_CONNECT_* — that's the shared contract in the monorepo's
      # android-signing.json, which maps CONNECT_GOOGLE/CONNECT_WEB -> the VpnHoodConnect .user store.
      # PrepareCiAndroidSigning.ps1 falls back to an ephemeral keystore when absent (not Play-grade)
      # so a fork still builds end-to-end.
      ANDROID_KEYSTORE_CONNECT_GOOGLE_BASE64: ${{ secrets.ANDROID_KEYSTORE_GOOGLE_BASE64 }}
      ANDROID_KEYSTORE_CONNECT_GOOGLE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_GOOGLE_PASSWORD }}
      ANDROID_KEYSTORE_CONNECT_WEB_BASE64: ${{ secrets.ANDROID_KEYSTORE_WEB_BASE64 }}
      ANDROID_KEYSTORE_CONNECT_WEB_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_WEB_PASSWORD }}
      # Default server access keys embedded as the access_key_default.txt resource (per store).
      ACCESS_KEY_DEFAULT_GOOGLE: ${{ secrets.ACCESS_KEY_DEFAULT_GOOGLE }}
      ACCESS_KEY_DEFAULT_WEB: ${{ secrets.ACCESS_KEY_DEFAULT_WEB }}
    steps:
      - name: Checkout monorepo code
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ github.event.inputs.ref || 'development' }}", path: code }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: code/global.json }
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/code/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=code/Pub/bin/$tag/VpnHoodConnect" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Install .NET Android workload
        shell: pwsh
        run: dotnet workload install android
      - name: Provision Android SDK
        shell: pwsh
        run: |
          dotnet build "$env:GITHUB_WORKSPACE/code/Src/Apps/Connect.Android.Web/VpnHood.App.Connect.Android.Web.csproj" `
            -t:InstallAndroidDependencies -p:AcceptAndroidSDKLicenses=True -p:AndroidSdkPath="$env:ANDROID_HOME"
      - name: Credentials + Android signing config
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/code/Pub/Lib/PrepareCiAndroidSigning.ps1"
      # Default server access keys -> the per-store .user files the csproj embeds as access_key_default.txt.
      - name: Write default access keys
        shell: pwsh
        run: |
          $u = Join-Path $env:GITHUB_WORKSPACE ".user/VpnHoodConnect"
          if (-not [string]::IsNullOrWhiteSpace($env:ACCESS_KEY_DEFAULT_GOOGLE)) {
            $d = Join-Path $u "google"; New-Item -ItemType Directory -Path $d -Force | Out-Null
            $env:ACCESS_KEY_DEFAULT_GOOGLE | Out-File (Join-Path $d "access_key_default_google.txt") -Encoding ascii -Force -NoNewline
          } else { Write-Host "::warning::ACCESS_KEY_DEFAULT_GOOGLE not set; the Google build has no default access key." }
          if (-not [string]::IsNullOrWhiteSpace($env:ACCESS_KEY_DEFAULT_WEB)) {
            $d = Join-Path $u "web"; New-Item -ItemType Directory -Path $d -Force | Out-Null
            $env:ACCESS_KEY_DEFAULT_WEB | Out-File (Join-Path $d "access_key_default_web.txt") -Encoding ascii -Force -NoNewline
          } else { Write-Host "::warning::ACCESS_KEY_DEFAULT_WEB not set; the web build has no default access key." }
      - name: Write publish.json
        if: vars.PUBLISH != ''
        shell: pwsh
        env:
          PUBLISH: ${{ vars.PUBLISH }}
        run: |
          $u = Join-Path $env:GITHUB_WORKSPACE ".user/VpnHoodConnect"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:PUBLISH | Out-File (Join-Path $u "publish.json") -Encoding utf8 -Force
      - name: Write Connect appsettings
        shell: pwsh
        env:
          APPSETTINGS: ${{ vars.APPSETTINGS }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:APPSETTINGS)) {
            throw "APPSETTINGS variable is not set, but a strict Android publish requires .user/VpnHoodConnect/appsettings.json."
          }
          $u = Join-Path $env:GITHUB_WORKSPACE ".user/VpnHoodConnect"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:APPSETTINGS | Out-File (Join-Path $u "appsettings.json") -Encoding utf8 -Force
      - name: Build Android Connect (${{ matrix.label }})
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/code/${{ matrix.script }}"
      - uses: actions/upload-artifact@v7
        with:
          name: connect-android-${{ matrix.id }}
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.MODULE_DIR }}/${{ matrix.outdir }}/**

  # Publish the Android AAB to Google Play from the CI artifact, using THIS repo's fastlane config +
  # the (org) GOOGLE_PLAY_API_KEY. This repo is checked out at ROOT, so fastlane (run from root) loads
  # THIS repo's fastlane/ (com.vpnhood.connect.android) — never the monorepo's code/fastlane.
  publish-play-android:
    needs: [build-android]
    if: needs.build-android.result == 'success' && github.event.inputs.publish_play != 'false'
    runs-on: ubuntu-latest
    env:
      GOOGLE_PLAY_API_KEY: ${{ secrets.GOOGLE_PLAY_API_KEY }}
    steps:
      - name: Checkout this repo (fastlane config, at root)
        uses: actions/checkout@v5
      - name: Checkout monorepo code
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ github.event.inputs.ref || 'development' }}", path: code }
      - name: Warn if Google Play API key is missing
        if: env.GOOGLE_PLAY_API_KEY == ''
        run: echo "::warning title=Google Play publish skipped::GOOGLE_PLAY_API_KEY is not set; the AAB will NOT be uploaded to Google Play. The release proceeds without a Play-signed APK."
      - name: Download built AAB artifact
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/download-artifact@v8
        with: { name: connect-android-google-aab, path: aab }
      - name: Resolve version, track, and paths
        if: env.GOOGLE_PLAY_API_KEY != ''
        shell: bash
        run: |
          set -e
          AAB_FILE=$(ls aab/*.aab 2>/dev/null | head -n1 || true)
          META_FILE=$(ls aab/*-android.json 2>/dev/null | head -n1 || true)
          if [ -z "$AAB_FILE" ] || [ -z "$META_FILE" ]; then
            echo "❌ AAB or its -android.json metadata not found in the build-android artifact"; exit 1
          fi
          VERSION_NAME=$(jq -r '.Version' "$META_FILE")
          VERSION_CODE=$(jq -r '(.VersionCode // .Build // .BuildNumber // "")' "$META_FILE")
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            if echo "$VERSION_NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              VERSION_CODE=$(echo "$VERSION_NAME" | awk -F'.' '{print $3}')
            else
              VERSION_CODE=$(echo "$VERSION_NAME" | tr -cd '0-9' | tail -c 9)
            fi
          fi
          # Audience ratio from the dispatch input (percent 1-100, default 100). 100 -> full (no fraction).
          ROLLOUT_PCT="${{ github.event.inputs.rollout }}"
          case "$ROLLOUT_PCT" in ''|*[!0-9]*) ROLLOUT_PCT=100 ;; esac
          if [ "$ROLLOUT_PCT" -ge 100 ]; then ROLLOUT=""; else ROLLOUT=$(awk "BEGIN{printf \"%.2f\", $ROLLOUT_PCT/100}"); fi
          # Track from PubVersion.json: prerelease -> alpha (closed testing), stable -> production.
          PRERELEASE=$(jq -r '.Prerelease' code/Pub/PubVersion.json)
          if [ "$PRERELEASE" = "true" ] || [ "$PRERELEASE" = "True" ]; then TRACK=alpha; else TRACK=production; fi
          # Staged rollout is production-only; testing tracks ship 'completed'.
          if [ "$TRACK" != "production" ]; then ROLLOUT=""; fi
          {
            echo "AAB_PATH=$GITHUB_WORKSPACE/$AAB_FILE"
            echo "VERSION_NAME=$VERSION_NAME"
            echo "VERSION_CODE=$VERSION_CODE"
            echo "ROLLOUT=$ROLLOUT"
            echo "TRACK=$TRACK"
          } >> $GITHUB_ENV
          echo "✅ VersionName=$VERSION_NAME VersionCode=$VERSION_CODE Track=$TRACK Rollout='$ROLLOUT'"
      - name: Set up Java
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Set up Ruby
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3", bundler-cache: false }
      - name: Install Fastlane
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: gem install fastlane --no-document
      # fastlane runs from the workspace ROOT -> loads THIS repo's fastlane/ (Connect's Appfile).
      - name: Upload AAB to Google Play (Fastlane)
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: |
          echo "Uploading $AAB_PATH (versionCode=$VERSION_CODE rollout='$ROLLOUT') to track $TRACK"
          # TEMP-CI-BINARY-ONLY: skip_metadata:"true" uploads only the AAB and leaves the live store
          # listing untouched. Drop the flag to also publish the Connect store listing.
          if ! fastlane android playstore \
            version_name:"$VERSION_NAME" \
            version_code:"$VERSION_CODE" \
            aab:"$AAB_PATH" \
            track:"$TRACK" \
            rollout:"$ROLLOUT" \
            skip_metadata:"true"; then
            echo "::error title=Google Play upload failed::Fastlane could not upload the Connect AAB to track '$TRACK' (declared versionCode=$VERSION_CODE). 'Version code N has already been used' means the AAB's embedded versionCode is N — verify ApplicationVersion=$VERSION_CODE. See the Fastlane error above."
            exit 1
          fi
      - name: Download Play-signed universal APK (Fastlane)
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: |
          fastlane android download_signed version_code:"$VERSION_CODE"
          SIGNED=$(find fastlane -type f -name "*.apk" | head -n1 || true)
          if [ -z "$SIGNED" ]; then echo "❌ No Play-signed APK found after download"; exit 1; fi
          BASE=$(basename "$AAB_PATH" .aab)   # e.g. VpnHoodConnect-android
          mkdir -p "$GITHUB_WORKSPACE/play-signed"
          cp "$SIGNED" "$GITHUB_WORKSPACE/play-signed/${BASE}.apk"
          echo "✅ Play-signed APK staged: play-signed/${BASE}.apk"
      - name: Upload Play-signed APK artifact
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/upload-artifact@v7
        with:
          name: connect-android-play-signed
          if-no-files-found: error
          retention-days: 1
          path: play-signed/**

  release:
    needs: [build-linux, build-windows, build-android, publish-play-android]
    if: >-
      ${{ always()
        && github.event.inputs.publish_release == 'true'
        && needs.build-linux.result == 'success'
        && needs.build-windows.result != 'failure'
        && needs.build-android.result != 'failure'
        && needs.publish-play-android.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # to delete this run's artifacts in the final step
    steps:
      - name: Checkout monorepo code
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ github.event.inputs.ref || 'development' }}", path: code }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: code/global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/code/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=code/Pub/bin/$tag/VpnHoodConnect" | Out-File -FilePath $env:GITHUB_ENV -Append
      # Reassemble the code/Pub/bin/<tag>/VpnHoodConnect layout PublishToGithub.ps1 expects. Windows and
      # Android are optional (a skipped build uploads nothing), so those downloads are best-effort.
      - uses: actions/download-artifact@v8
        with: { name: connect-linux, path: "${{ env.MODULE_DIR }}" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: connect-windows, path: "${{ env.MODULE_DIR }}/windows-web" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: connect-android-google-aab, path: "${{ env.MODULE_DIR }}/android-google" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: connect-android-web-apk, path: "${{ env.MODULE_DIR }}/android-web" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: connect-android-web-arm64, path: "${{ env.MODULE_DIR }}/android-web-arm64" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: connect-android-play-signed, path: "${{ env.MODULE_DIR }}/android-google" }
      - name: Create GitHub release (Connect repo)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          . "$env:GITHUB_WORKSPACE/code/Pub/Lib/ResolvePublishRepo.ps1"
          & "$env:GITHUB_WORKSPACE/code/Pub/Lib/PublishToGithub.ps1" `
            -packageDirName "VpnHoodConnect" `
            -repoName (Resolve-PublishRepoSlug -Connect) `
            -dropChangelogTag "#client"
      - name: Delete this run's artifacts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[].id')
          if [ -z "$ids" ]; then echo "No artifacts to delete."; exit 0; fi
          for id in $ids; do
            echo "Deleting artifact id=$id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
          done
